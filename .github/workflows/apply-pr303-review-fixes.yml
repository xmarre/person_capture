name: PR303 fix

on:
  push:
    branches: [tmp-pr303-review-fixes]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp-pr303-review-fixes
          fetch-depth: 0
      - run: |
          cp .github/patches/pr303_review_fixes.patch /tmp/fix.patch
          git fetch origin video-hdr-prescan-fast-path
          git checkout -B video-hdr-prescan-fast-path origin/video-hdr-prescan-fast-path
          git apply --check /tmp/fix.patch
          git apply /tmp/fix.patch
          python -S -m py_compile person_capture/gui_app.py person_capture/video_io.py
          git config user.name github-actions
          git config user.email actions@github.com
          git add person_capture/gui_app.py person_capture/video_io.py
          git commit -m review-fixes-pr303
          git push origin HEAD:video-hdr-prescan-fast-path
