name: pr303-followup
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  apply:
    if: ${{ github.event.head_commit.message != 'review-fixes-pr303-sync' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: video-hdr-prescan-fast-path
          fetch-depth: 0
      - run: |
          set -euxo pipefail
          git reset --hard fa5805f9bf73a4812d4bf1a3cc71834fc10fbb87
          python -S - <<'PY'
          from pathlib import Path
          p = Path('person_capture/gui_app.py')
          s = p.read_text()
          old = '''                        os.environ.setdefault("OPENCV_FFMPEG_CAPTURE_OPTIONS", "hwaccel;cuda")
                        cap = cv2.VideoCapture(cfg.video, cv2.CAP_FFMPEG)
'''
          new = '''                        prev_ffmpeg_opts = os.environ.get("OPENCV_FFMPEG_CAPTURE_OPTIONS")
                        try:
                            os.environ["OPENCV_FFMPEG_CAPTURE_OPTIONS"] = "hwaccel;cuda"
                            cap = cv2.VideoCapture(cfg.video, cv2.CAP_FFMPEG)
                        finally:
                            if prev_ffmpeg_opts is None:
                                os.environ.pop("OPENCV_FFMPEG_CAPTURE_OPTIONS", None)
                            else:
                                os.environ["OPENCV_FFMPEG_CAPTURE_OPTIONS"] = prev_ffmpeg_opts
'''
          if old not in s:
              raise SystemExit('opencv env marker not found')
          s = s.replace(old, new, 1)
          old = '''                        hdr_active = False
                        cap.set(cv2.CAP_PROP_BUFFERSIZE, 2)
                        fps = float(cap.get(cv2.CAP_PROP_FPS) or fps or 30.0)
                        total_frames = int(cap.get(cv2.CAP_PROP_FRAME_COUNT) or total_frames or 0)
'''
          new = '''                        hdr_active = False
                        self._hdr_passthrough_active = False
                        self._hdr_preview_latest = None
                        try:
                            self.preview_hdr_p010.emit(None)
                        except Exception:
                            pass
                        cap.set(cv2.CAP_PROP_BUFFERSIZE, 2)
                        fps = float(cap.get(cv2.CAP_PROP_FPS) or fps or 30.0)
                        total_frames = int(cap.get(cv2.CAP_PROP_FRAME_COUNT) or total_frames or 0)
                        self._fps = fps
                        self._total_frames = total_frames
                        try:
                            self._keyframes = self._read_keyframes_worker(cfg.video, fps, total_frames)
                        except Exception:
                            self._keyframes = []
                        try:
                            self.keyframes.emit(list(self._keyframes))
                        except Exception:
                            pass
                        try:
                            self.setup.emit(total_frames, fps)
                        except Exception:
                            pass
                        try:
                            self.status.emit(f"KFs={len(self._keyframes)} fps={float(fps):.3f} total={total_frames}")
                        except Exception:
                            pass
                        try:
                            self.progress.emit(0)
                        except Exception:
                            pass
'''
          if old not in s:
              raise SystemExit('state marker not found')
          s = s.replace(old, new, 1)
          old = '''        widget = getattr(self, "hdr_widget", None)
        if widget is None:
            return

        try:
            width, height, y_plane, uv_plane, stride_y, stride_uv = frame  # type: ignore[misc]
'''
          new = '''        widget = getattr(self, "hdr_widget", None)
        if widget is None:
            return

        if frame is None:
            if self._hdr_passthrough_enabled:
                log.info("HDR passthrough: disabling (worker fallback)")
            self._hdr_passthrough_enabled = False
            try:
                if hasattr(self, "preview_stack") and self.preview_stack.currentIndex() != 0:
                    self.preview_stack.setCurrentIndex(0)
            except Exception:
                pass
            return

        try:
            width, height, y_plane, uv_plane, stride_y, stride_uv = frame  # type: ignore[misc]
'''
          if old not in s:
              raise SystemExit('hdr ui marker not found')
          s = s.replace(old, new, 1)
          p.write_text(s)
          PY
          python -S -m py_compile person_capture/gui_app.py person_capture/video_io.py
          git config user.name github-actions
          git config user.email actions@github.com
          git add person_capture/gui_app.py
          git commit -m review-fixes-pr303-sync
          git push --force-with-lease origin HEAD:video-hdr-prescan-fast-path
